<!-- Simple SVG logo placeholder -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34a853;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Eye symbol representing vision -->
  <ellipse cx="50" cy="50" rx="40" ry="25" fill="url(#logoGradient)" stroke="white" stroke-width="2"/>
  <circle cx="50" cy="50" r="12" fill="white"/>
  <circle cx="50" cy="50" r="6" fill="#4285f4"/>
  
  <!-- Number 30 -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#4285f4">30</text>
</svg>